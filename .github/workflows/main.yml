name: Build Ali VIP APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -o ali-vip.zip -d .
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK
      run: |
        gradle assembleDebug || gradle build || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ali-vip-app
        path: '**/build/outputs/apk/debug/*.apk'
